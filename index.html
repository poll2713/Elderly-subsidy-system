<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老年就餐补贴数据分析平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f2f5;color:#333;display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,#1a3a5c,#0d2137);color:#fff;padding:20px 0;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sidebar h2{text-align:center;font-size:18px;padding:0 16px 20px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:8px}
.sidebar h2 span{display:block;font-size:12px;font-weight:400;opacity:.6;margin-top:4px}
.nav-item{padding:13px 24px;cursor:pointer;font-size:14px;transition:.2s;display:flex;align-items:center;gap:10px;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.08)}
.nav-item.active{background:rgba(255,255,255,.15);border-left-color:#4fc3f7;font-weight:700}
.nav-icon{font-size:16px;width:20px;text-align:center}
.main{flex:1;margin-left:220px;padding:24px}
.header{background:#fff;border-radius:10px;padding:18px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;color:#1a3a5c}
.header .time{font-size:13px;color:#999}
.tab-content{display:none}
.tab-content.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px}
.kpi-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.kpi-icon.blue{background:#e3f2fd;color:#1976d2}
.kpi-icon.green{background:#e8f5e9;color:#388e3c}
.kpi-icon.orange{background:#fff3e0;color:#f57c00}
.kpi-icon.red{background:#ffebee;color:#d32f2f}
.kpi-value{font-size:28px;font-weight:700;color:#1a3a5c}
.kpi-label{font-size:13px;color:#999;margin-top:2px}
.kpi-sub{font-size:12px;color:#666;margin-top:2px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-row.three{grid-template-columns:1fr 1fr 1fr}
.chart-panel{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chart-panel h3{font-size:15px;color:#1a3a5c;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.chart-panel.full{grid-column:1/-1}
.chart-box{width:100%;height:320px}
.chart-box.small{height:280px}
.chart-box.tall{height:400px}
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center}
.filters select,.filters input{padding:7px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;outline:none;min-width:120px}
.filters select:focus,.filters input:focus{border-color:#4fc3f7}
.filters input[type=date]{min-width:140px}
.filters input[type=text]{min-width:180px}
.filters label{font-size:13px;color:#666;white-space:nowrap}
.btn{padding:7px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;transition:.2s}
.btn-primary{background:#1976d2;color:#fff}
.btn-primary:hover{background:#1565c0}
.btn-outline{background:#fff;border:1px solid #1976d2;color:#1976d2}
.btn-outline:hover{background:#e3f2fd}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:#f5f7fa;padding:8px 6px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e0e0e0;position:sticky;top:0;white-space:nowrap}
.data-table td{padding:7px 6px;border-bottom:1px solid #f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* 就餐记录表列宽：10列总和100% */
#dr-table th:nth-child(1),#dr-table td:nth-child(1){width:7%}
#dr-table th:nth-child(2),#dr-table td:nth-child(2){width:9%}
#dr-table th:nth-child(3),#dr-table td:nth-child(3){width:8%}
#dr-table th:nth-child(4),#dr-table td:nth-child(4){width:9%}
#dr-table th:nth-child(5),#dr-table td:nth-child(5){width:9%}
#dr-table th:nth-child(6),#dr-table td:nth-child(6){width:12%}
#dr-table th:nth-child(7),#dr-table td:nth-child(7){width:12%}
#dr-table th:nth-child(8),#dr-table td:nth-child(8){width:12%}
#dr-table th:nth-child(9),#dr-table td:nth-child(9){width:10%}
#dr-table th:nth-child(10),#dr-table td:nth-child(10){width:12%}
/* 结算管理表：9列总和100% */
#sm-table th:nth-child(1),#sm-table td:nth-child(1){width:8%}
#sm-table th:nth-child(2),#sm-table td:nth-child(2){width:11%}
#sm-table th:nth-child(3),#sm-table td:nth-child(3){width:11%}
#sm-table th:nth-child(4),#sm-table td:nth-child(4){width:11%}
#sm-table th:nth-child(5),#sm-table td:nth-child(5){width:13%}
#sm-table th:nth-child(6),#sm-table td:nth-child(6){width:13%}
#sm-table th:nth-child(7),#sm-table td:nth-child(7){width:13%}
#sm-table th:nth-child(8),#sm-table td:nth-child(8){width:10%}
#sm-table th:nth-child(9),#sm-table td:nth-child(9){width:10%}
/* 预警记录表：9列总和100% */
#aw-table th:nth-child(1),#aw-table td:nth-child(1){width:8%}
#aw-table th:nth-child(2),#aw-table td:nth-child(2){width:8%}
#aw-table th:nth-child(3),#aw-table td:nth-child(3){width:8%}
#aw-table th:nth-child(4),#aw-table td:nth-child(4){width:10%}
#aw-table th:nth-child(5),#aw-table td:nth-child(5){width:10%}
#aw-table th:nth-child(6),#aw-table td:nth-child(6){width:12%}
#aw-table th:nth-child(7),#aw-table td:nth-child(7){width:12%}
#aw-table th:nth-child(8),#aw-table td:nth-child(8){width:12%}
#aw-table th:nth-child(9),#aw-table td:nth-child(9){width:20%}
/* 老人账户表：8列总和100% */
#ef-table th:nth-child(1),#ef-table td:nth-child(1){width:8%}
#ef-table th:nth-child(2),#ef-table td:nth-child(2){width:10%}
#ef-table th:nth-child(3),#ef-table td:nth-child(3){width:8%}
#ef-table th:nth-child(4),#ef-table td:nth-child(4){width:8%}
#ef-table th:nth-child(5),#ef-table td:nth-child(5){width:13%}
#ef-table th:nth-child(6),#ef-table td:nth-child(6){width:18%}
#ef-table th:nth-child(7),#ef-table td:nth-child(7){width:18%}
#ef-table th:nth-child(8),#ef-table td:nth-child(8){width:17%}

.data-table tr:hover td{background:#f8faff}
.table-wrap{max-height:500px;overflow:auto;border-radius:8px;border:1px solid #eee}
.badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.badge-red{background:#ffebee;color:#c62828}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-yellow{background:#fffde7;color:#f9a825}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-gray{background:#f5f5f5;color:#666}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat-mini{background:#fff;border-radius:8px;padding:12px 16px;box-shadow:0 1px 2px rgba(0,0,0,.04);flex:1;min-width:120px;text-align:center}
.stat-mini .num{font-size:22px;font-weight:700;color:#1a3a5c}
.stat-mini .lbl{font-size:12px;color:#999}
.empty-state{text-align:center;padding:40px;color:#bbb;font-size:15px}
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:14px;font-size:13px}
.pagination button{padding:6px 14px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer}
.pagination button:hover{background:#e3f2fd}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination .current{font-weight:700;color:#1976d2}
@media(max-width:1200px){.chart-row,.chart-row.three{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="sidebar">
  <h2>就餐补贴平台<span>数据分析可视化</span></h2>
  <div class="nav-item active" data-tab="dashboard"><span class="nav-icon"></span>概览仪表盘</div>
  <div class="nav-item" data-tab="elderly"><span class="nav-icon"></span>老人管理</div>
  <div class="nav-item" data-tab="dining"><span class="nav-icon"></span>就餐记录</div>
  <div class="nav-item" data-tab="subsidy"><span class="nav-icon"></span>补贴分析</div>
  <div class="nav-item" data-tab="settlement"><span class="nav-icon"></span>结算管理</div>
  <div class="nav-item" data-tab="warning"><span class="nav-icon"></span>预警监控</div>
</div>

<div class="main">
  <div class="header">
    <h1 id="pageTitle">概览仪表盘</h1>
    <div class="time" id="clock"></div>
  </div>

  <!-- ==================== 1. 概览仪表盘 ==================== -->
  <div class="tab-content active" id="tab-dashboard">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-icon blue"></div><div><div class="kpi-value" id="kpi-elderly">50</div><div class="kpi-label">在册老人</div><div class="kpi-sub">正常45 / 冻结3 / 注销2</div></div></div>
      <div class="kpi-card"><div class="kpi-icon green"></div><div><div class="kpi-value" id="kpi-dining">1664</div><div class="kpi-label">就餐总人次</div><div class="kpi-sub">9个月累计数据</div></div></div>
      <div class="kpi-card"><div class="kpi-icon orange"></div><div><div class="kpi-value" id="kpi-subsidy">¥5,060</div><div class="kpi-label">补贴总额</div><div class="kpi-sub">政府补贴合计金额</div></div></div>
      <div class="kpi-card"><div class="kpi-icon red"></div><div><div class="kpi-value" id="kpi-warning">20</div><div class="kpi-label">异常预警</div><div class="kpi-sub">高7 / 中9 / 低4</div></div></div>
    </div>
    <div class="chart-row">
      <div class="chart-panel"><h3>月度就餐趋势</h3><div class="chart-box" id="chart-monthly-trend"></div></div>
      <div class="chart-panel"><h3>各就餐点占比</h3><div class="chart-box" id="chart-dining-point-pie"></div></div>
    </div>
    <div class="chart-row">
      <div class="chart-panel"><h3>各就餐点月度对比</h3><div class="chart-box tall" id="chart-point-monthly"></div></div>
      <div class="chart-panel"><h3>补贴类型分布</h3><div class="chart-box tall" id="chart-subsidy-type"></div></div>
    </div>
  </div>

  <!-- ==================== 2. 老人管理 ==================== -->
  <div class="tab-content" id="tab-elderly">
    <div class="filters">
      <label>补贴类型：</label><select id="ef-type"><option value="">全部</option><option>低保</option><option>特困</option><option>高龄</option><option>普通</option></select>
      <label>补贴等级：</label><select id="ef-level"><option value="">全部</option><option>一级</option><option>二级</option><option>三级</option></select>
      <label>账户状态：</label><select id="ef-status"><option value="">全部</option><option>正常</option><option>冻结</option><option>注销</option></select>
      <label>年龄：</label><select id="ef-age"><option value="">全部</option><option>60-69</option><option>70-79</option><option>80+</option></select>
      <input type="text" id="ef-search" placeholder="搜索姓名/地址...">
    </div>
    <div class="stat-row" id="ef-stats"></div>
    <div class="chart-row">
      <div class="chart-panel"><h3>年龄段分布</h3><div class="chart-box small" id="chart-age-dist"></div></div>
      <div class="chart-panel"><h3>补贴类型构成</h3><div class="chart-box small" id="chart-elderly-type"></div></div>
    </div>
    <div class="table-wrap" id="ef-table-wrap"><table class="data-table" id="ef-table"></table></div>
    <div class="pagination" id="ef-pagination"></div>
  </div>

  <!-- ==================== 3. 就餐记录 ==================== -->
  <div class="tab-content" id="tab-dining">
    <div class="filters">
      <label>月份：</label><select id="dr-month"><option value="">全部</option><option>2025-03</option><option>2025-04</option><option>2025-05</option><option>2025-06</option><option>2025-07</option><option>2025-08</option><option>2025-09</option><option>2025-10</option><option>2025-11</option><option>2025-06</option><option>2025-07</option><option>2025-08</option><option>2025-09</option><option>2025-10</option><option>2025-11</option><option>2025-06</option><option>2025-07</option><option>2025-08</option><option>2025-09</option><option>2025-10</option><option>2025-11</option></select>
      <label>就餐点：</label><select id="dr-point"><option value="">全部</option></select>
      <label>结算状态：</label><select id="dr-settle"><option value="">全部</option><option>已结算</option><option>待结算</option></select>
      <input type="text" id="dr-search" placeholder="搜索老人姓名/餐品...">
    </div>
    <div class="stat-row" id="dr-stats"></div>
    <div class="table-wrap" id="dr-table-wrap"><table class="data-table" id="dr-table"></table></div>
    <div class="pagination" id="dr-pagination"></div>
  </div>

  <!-- ==================== 4. 补贴分析 ==================== -->
  <div class="tab-content" id="tab-subsidy">
    <div class="chart-row">
      <div class="chart-panel"><h3>月度补贴金额趋势</h3><div class="chart-box" id="chart-subsidy-trend"></div></div>
      <div class="chart-panel"><h3>各类别补贴对比</h3><div class="chart-box" id="chart-subsidy-category"></div></div>
    </div>
    <div class="chart-row">
      <div class="chart-panel"><h3>老人补贴排行 TOP10</h3><div class="chart-box tall" id="chart-subsidy-ranking"></div></div>
      <div class="chart-panel"><h3>补贴/实付比例</h3><div class="chart-box tall" id="chart-subsidy-ratio"></div></div>
    </div>
  </div>

  <!-- ==================== 5. 结算管理 ==================== -->
  <div class="tab-content" id="tab-settlement">
    <div class="filters">
      <label>月份：</label><select id="sm-month"><option value="">全部</option></select>
      <label>就餐点：</label><select id="sm-point"><option value="">全部</option></select>
      <label>结算状态：</label><select id="sm-status"><option value="">全部</option><option>已结算</option><option>待结算</option></select>
    </div>
    <div class="chart-row">
      <div class="chart-panel"><h3>各月结算金额对比</h3><div class="chart-box tall" id="chart-settlement-bar"></div></div>
      <div class="chart-panel"><h3>结算状态分布</h3><div class="chart-box tall" id="chart-settlement-pie"></div></div>
    </div>
    <div class="table-wrap"><table class="data-table" id="sm-table"></table></div>
  </div>

  <!-- ==================== 6. 预警监控 ==================== -->
  <div class="tab-content" id="tab-warning">
    <div class="filters">
      <label>风险等级：</label><select id="aw-risk"><option value="">全部</option><option>高</option><option>中</option><option>低</option></select>
      <label>处理状态：</label><select id="aw-status"><option value="">全部</option><option>待处理</option><option>处理中</option><option>已处理</option><option>已忽略</option></select>
      <label>预警类型：</label><select id="aw-type"><option value="">全部</option><option>超额补贴</option><option>重复就餐</option><option>身份异常</option><option>其他</option></select>
    </div>
    <div class="chart-row">
      <div class="chart-panel"><h3>风险等级分布</h3><div class="chart-box" id="chart-warning-pie"></div></div>
      <div class="chart-panel"><h3>预警类型与处理状态</h3><div class="chart-box" id="chart-warning-bar"></div></div>
    </div>
    <div class="table-wrap"><table class="data-table" id="aw-table"></table></div>
  </div>
</div>

// 工具函数

function fmt(n){return typeof n==='number'?n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','):n}
function badgeClass(v,map){return map[v]||'gray'}
function getMonth(ts){return ts.substring(0,7)}
function getElderlyName(id){var e=elderlyMap[id];return e?e.name:id}

var charts={};
function initChart(id){
  if(charts[id]){charts[id].dispose();}
  var el=document.getElementById(id);
  if(!el)return null;
  charts[id]=echarts.init(el);
  return charts[id];
}

var efPage=1,efSize=15;
function renderElderly(){
  var type=document.getElementById('ef-type').value,level=document.getElementById('ef-level').value;
  var status=document.getElementById('ef-status').value,age=document.getElementById('ef-age').value;
  var kw=document.getElementById('ef-search').value.toLowerCase();
  var filtered=elderlyData.filter(e=>{
    if(status&&e.status!==status)return false;
    var q=subsidyMap[e.id]; if(!q)return false;
    if(type&&q.type!==type)return false;
    if(level&&q.level!==level)return false;
    if(age){var a=e.age;if(age==='60-69'&&(a<60||a>69))return false;if(age==='70-79'&&(a<70||a>79))return false;if(age==='80+'&&a<80)return false;}
    if(kw&&!e.name.includes(kw)&&!e.addr.includes(kw))return false;

  var stats='<div class="stat-mini"><div class="num">'+filtered.length+'</div><div class="lbl">筛选结果</div></div>';

  Object.keys(tMap).forEach(k=>stats+='<div class="stat-mini"><div class="num">'+tMap[k]+'</div><div class="lbl">'+k+'</div></div>');
  document.getElementById('ef-stats').innerHTML=stats;

  var sMap={'正常':'green','冻结':'orange','注销':'red'},tColors={'低保':'red','特困':'orange','高龄':'blue','普通':'gray'};
  pageData.forEach(e=>{

    html+='<td><span class="badge badge-'+badgeClass(q.type,tColors)+'">'+(q.type||'-')+'</span></td>';
    html+='<td>'+(q.level||'-')+'</td>';
    html+='<td><span class="badge badge-'+badgeClass(e.status,sMap)+'">'+e.status+'</span></td></tr>';
  });
  html+='</tbody>';
  document.getElementById('ef-table').innerHTML=html;
  // 分页控件
  var pg='';
  for(var i=1;i<=total;i++)pg+='<button '+(i===efPage?'class="current"':'')+' onclick="efPage='+i+';renderElderly()" '+(i===efPage?'disabled':'')+'>'+i+'</button>';
  document.getElementById('ef-pagination').innerHTML=pg||'<span style="color:#999">共 '+filtered.length+' 条</span>';
  // 图表
  var ageDist=[0,0,0];
  filtered.forEach(e=>{var a=e.age;if(a<70)ageDist[0]++;else if(a<80)ageDist[1]++;else ageDist[2]++});
  var c5=initChart('chart-age-dist');
  if(c5)c5.setOption({tooltip:{trigger:'axis'},xAxis:{data:['60-69岁','70-79岁','80岁以上']},yAxis:{type:'value'},series:[{type:'bar',data:ageDist,itemStyle:{color:['#66bb6a','#42a5f5','#ef5350']},barWidth:'50%'}]});
  var c6=initChart('chart-elderly-type');
  if(c6)c6.setOption({tooltip:{trigger:'item'},series:[{type:'pie',radius:'60%',data:Object.keys(tMap).map(k=>({name:k,value:tMap[k]})),label:{formatter:'{b}: {c}人'}}]});

  var mAmt={},mSubsidy={};
  filtered.forEach(s=>{var p=s.period;mAmt[p]=(mAmt[p]||0)+s.amount;mSubsidy[p]=(mSubsidy[p]||0)+s.subsidy});
  var c11=initChart('chart-settlement-bar');
  if(c11)c11.setOption({
    tooltip:{trigger:'axis'},legend:{data:['消费总额','补贴总额']},
    xAxis:{data:['3月','4月','5月','6月','7月','8月','9月','10月','11月']},yAxis:{type:'value',name:'元'},
    series:[
      {name:'消费总额',type:'bar',data:months.map(m=>mAmt[m]||0),itemStyle:{color:'#42a5f5'}},
      {name:'补贴总额',type:'bar',data:months.map(m=>mSubsidy[m]||0),itemStyle:{color:'#ef5350'}}
    ]
  });
  var sc={},sa={};
  filtered.forEach(s=>{sc[s.status]=(sc[s.status]||0)+1});
  var c12=initChart('chart-settlement-pie');
  if(c12)c12.setOption({tooltip:{trigger:'item'},series:[{type:'pie',radius:'55%',data:Object.keys(sc).map(k=>({name:k,value:sc[k]})),label:{formatter:'{b}: {c}单'}}]});
}
['sm-month','sm-point','sm-status'].forEach(id=>document.getElementById(id).addEventListener('change',renderSettlement));

// ---- 6. 预警监控 ----
function renderWarning(){
  var risk=document.getElementById('aw-risk').value,status=document.getElementById('aw-status').value,type=document.getElementById('aw-type').value;
  var filtered=warningData.filter(w=>{
    if(risk&&w.risk!==risk)return false;
    if(status&&w.status!==status)return false;
    if(type&&w.type!==type)return false;
    return true;
  });
  var html='<thead><tr><th>预警ID</th><th>关联记录</th><th>老人</th><th>就餐点</th><th>时间</th><th>类型</th><th>风险等级</th><th>处理状态</th><th>描述</th></tr></thead><tbody>';
  var rColors={'高':'red','中':'orange','低':'green'},sColors={'待处理':'red','处理中':'orange','已处理':'green','已忽略':'gray'},tColors={'超额补贴':'red','重复就餐':'orange','身份异常':'blue','其他':'gray'};
  filtered.forEach(w=>{
    html+='<tr><td>'+w.id+'</td><td>'+w.drid+'</td><td>'+getElderlyName(w.eid)+'</td><td>'+getPointName(w.pid)+'</td><td>'+w.time+'</td>';
    html+='<td><span class="badge badge-'+badgeClass(w.type,tColors)+'">'+w.type+'</span></td>';
    html+='<td><span class="badge badge-'+badgeClass(w.risk,rColors)+'">'+w.risk+'</span></td>';
    html+='<td><span class="badge badge-'+badgeClass(w.status,sColors)+'">'+w.status+'</span></td>';
    html+='<td>'+w.desc+'</td></tr>';
  });
  html+='</tbody>';
  document.getElementById('aw-table').innerHTML=html;
  // 图表
  var rc={},sc2={},tc={};
  filtered.forEach(w=>{rc[w.risk]=(rc[w.risk]||0)+1;sc2[w.status]=(sc2[w.status]||0)+1;tc[w.type]=(tc[w.type]||0)+1});
  var c13=initChart('chart-warning-pie');
  if(c13)c13.setOption({
    tooltip:{trigger:'item'},color:['#d32f2f','#f57c00','#66bb6a'],
    series:[{type:'pie',radius:'55%',data:Object.keys(rc).map(k=>({name:k+'风险',value:rc[k]})),label:{formatter:'{b}: {c}条'}}]
  });
  var c14=initChart('chart-warning-bar');
  if(c14)c14.setOption({
    tooltip:{trigger:'axis'},legend:{data:['待处理','处理中','已处理','已忽略']},
    xAxis:{data:Object.keys(tc)},yAxis:{type:'value'},
    series:['待处理','处理中','已处理','已忽略'].map((s,i)=>({name:s,type:'bar',stack:'total',data:Object.keys(tc).map(t=>filtered.filter(w=>w.type===t&&w.status===s).length)}))
  });
}
['aw-risk','aw-status','aw-type'].forEach(id=>document.getElementById(id).addEventListener('change',renderWarning));
